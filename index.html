<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0;
        background: #fff;
        color: #111;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100%;
      }
      input, button, textarea, select { font-family: inherit; }
      input::placeholder { color: rgba(0,0,0,0.35); }
    </style>
    <meta name="description" content="Sistema de turnos para estaciones de glitter y visagismo" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Glitter Bar" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Glitter Bar</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
